services:
  - type: web
    name: hal-inventory-system
    env: node
    plan: free
    # The build command runs on a temporary disk. It builds frontend and backend code.
    buildCommand: "cd frontend && npm install --legacy-peer-deps && npm run build && cd ../backend && npm install --legacy-peer-deps && npx prisma generate && npm run build"
    # The start command runs on the persistent environment. It pushes the schema to the SQLite file, seeds default data, and starts the server.
    startCommand: "cd backend && npx prisma db push && npm run prisma:seed && npm run start"
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./dev.db
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: CORS_ORIGIN
        value: "*"
