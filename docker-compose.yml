version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=file:/app/prisma/dev.db
      - JWT_SECRET=HAL_Super_Secret_JWT_Key_2024
      - JWT_EXPIRES_IN=8h
      - LOG_LEVEL=info
      - CORS_ORIGIN=*
    volumes:
      # Mount the database file persistently
      - oims_data:/app/prisma
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    # Note: Frontend doesn't need ports mapped because Nginx handles it

  proxy:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    restart: always

volumes:
  oims_data:
    name: oims_hal_database